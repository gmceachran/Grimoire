<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table of Contents</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Table of Contents</h1>
  </header>

  <main>
    <section id="chapter-form">
      <input id="input" type="text" placeholder="Enter chapter title..." />
      <button id="add-chapter">Add Chapter</button>
    </section>

    <section id="chapter-list">
      <ul id="contents-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
